<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 40px 36px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #111;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .desc {
      font-size: 14px;
      color: #777;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .btn-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      letter-spacing: -0.01em;
    }

    .btn-login:hover {
      background: #333;
    }

    .btn-login img {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #ccc;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }

    .note {
      font-size: 12px;
      color: #aaa;
      line-height: 1.7;
      text-align: center;
    }

    .note a {
      color: #888;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .error-msg {
      margin-top: 16px;
      padding: 11px 14px;
      background: #fff5f5;
      border: 1px solid #fecdcd;
      border-radius: 8px;
      color: #c0392b;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <div class="brand">
        <div class="brand-icon">
          <img src="/icon.jpg" alt="Threads">
        </div>
        <span class="brand-name">Threads Manager</span>
      </div>

      <h1>アカウントと連携して<br>分析を始める</h1>
      <p class="desc">Threadsの投稿データを分析し、エンゲージメントの改善や予約投稿の管理ができます。</p>

      <a href="/auth/login" class="btn-login">
        <img src="/icon.jpg" alt="Threads">
        Threadsで続ける
      </a>

      <div id="errorMsg" class="error-msg"></div>

      <div class="divider">または</div>

      <p class="note">
        続けることで<a href="/privacy-policy.html">プライバシーポリシー</a>と<a href="/terms-of-service.html">利用規約</a>に同意します
      </p>

    </div>
  </div>

  <script>
    const err = new URLSearchParams(location.search).get('error');
    if (err) {
      const el = document.getElementById('errorMsg');
      el.style.display = 'block';
      el.textContent = err === 'denied'
        ? '連携がキャンセルされました。もう一度お試しください。'
        : '連携に失敗しました。しばらく経ってから再試行してください。';
    }
  </script>
</body>
</html>
